name: Check Catalog Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Taeglich um 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: catalog-sync
  cancel-in-progress: false

jobs:
  check-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch BSI catalog and official vocabularies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run fetch-catalog

      - name: Compare with tracked upstream manifest
        id: compare
        run: |
          RESULT="$(node scripts/sync-upstream-manifest.mjs)"
          printf '%s\n' "$RESULT"

          SYNC_JSON="$(printf '%s\n' "$RESULT" | sed -n 's/^SYNC_RESULT_JSON=//p' | tail -n 1)"
          if [ -z "$SYNC_JSON" ]; then
            echo "SYNC_RESULT_JSON missing from sync-upstream-manifest output" >&2
            exit 1
          fi

          DELIMITER="gha_delimiter_$(date +%s)_$$"
          {
            printf 'changed=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.changed')"
            printf 'local_signature=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.local_signature')"
            printf 'remote_signature=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.remote_signature')"
            printf 'snapshot_commit_sha=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.snapshot_commit_sha')"
            printf 'change_summary<<%s\n' "$DELIMITER"
            printf '%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.change_summary')"
            printf '%s\n' "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing sync PR
        id: idempotency
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_SHA: ${{ steps.compare.outputs.snapshot_commit_sha }}
        run: |
          SHA12="${SNAPSHOT_SHA:0:12}"
          BRANCH="chore/catalog-sync-${SHA12}"
          EXISTING=$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING fuer Branch $BRANCH bereits vorhanden, verwende die bestehende PR."
            echo "create_pr=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "Remote branch $BRANCH bereits vorhanden, verwende ihn erneut."
              echo "branch_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "branch_exists=false" >> "$GITHUB_OUTPUT"
            fi
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare sync PR body
        if: steps.compare.outputs.changed == 'true'
        env:
          SNAPSHOT_SHA: ${{ steps.compare.outputs.snapshot_commit_sha }}
          CHANGE_SUMMARY: ${{ steps.compare.outputs.change_summary }}
        run: |
          {
            echo "## BSI-Katalog-Aenderungen"
            echo ""
            printf '%s\n' "$CHANGE_SUMMARY"
            echo ""
            printf '**BSI-Snapshot:** [`%s`](https://github.com/BSI-Bund/Stand-der-Technik-Bibliothek/commit/%s)\n' \
              "${SNAPSHOT_SHA}" "${SNAPSHOT_SHA}"
            echo ""
            echo "## Review"
            echo ""
            echo "Dieser Sync-PR wird bewusst nicht automatisch gemerged."
            echo "GitHub-Review ist bei \`dfurater\` angefragt; die fachliche Review-Erwartung liegt bei Codex/Claude Code vor dem manuellen Merge."
            echo ""
            echo "*Erstellt automatisch durch den taeglichen Katalog-Sync.*"
          } > /tmp/pr-body.md

      - name: Create sync branch and PR
        id: create
        if: steps.compare.outputs.changed == 'true' && steps.idempotency.outputs.create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.idempotency.outputs.branch }}
          BRANCH_EXISTS: ${{ steps.idempotency.outputs.branch_exists }}
          SNAPSHOT_SHA: ${{ steps.compare.outputs.snapshot_commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$BRANCH_EXISTS" != "true" ]; then
            git checkout -b "$BRANCH"
            git add upstream-manifest.json
            git commit -m "chore(ci): update BSI upstream manifest (${SNAPSHOT_SHA:0:12})"
            git push origin "$BRANCH"
          else
            # Ensure refs/remotes/origin/$BRANCH exists so --force-with-lease has a lease value.
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH"
            git add upstream-manifest.json
            git commit -m "chore(ci): update BSI upstream manifest (${SNAPSHOT_SHA:0:12})"
            git push --force-with-lease origin "$BRANCH"
          fi

          PR_URL=$(gh pr create \
            --title "chore(ci): BSI-Katalog-Sync ${SNAPSHOT_SHA:0:12}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH")

          echo "PR erstellt: $PR_URL"
          PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Request manual sync PR review
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER_CREATE: ${{ steps.create.outputs.pr_number }}
          PR_NUMBER_EXISTING: ${{ steps.idempotency.outputs.pr_number }}
        run: |
          set -euo pipefail

          PR_NUMBER="${PR_NUMBER_CREATE:-$PR_NUMBER_EXISTING}"
          if [ -z "$PR_NUMBER" ]; then
            echo "Kein Sync-PR gefunden, kann keine Review anfragen." >&2
            exit 1
          fi

          gh pr edit "$PR_NUMBER" \
            --body-file /tmp/pr-body.md \
            --add-reviewer dfurater

          echo "Sync-PR #$PR_NUMBER bleibt fuer manuelle Review und Merge offen."
