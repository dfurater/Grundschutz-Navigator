name: Check Catalog Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Taeglich um 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: catalog-sync
  cancel-in-progress: false

jobs:
  check-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch BSI catalog and official vocabularies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run fetch-catalog

      - name: Compare with tracked upstream manifest
        id: compare
        run: |
          RESULT="$(node scripts/sync-upstream-manifest.mjs)"
          printf '%s\n' "$RESULT"

          SYNC_JSON="$(printf '%s\n' "$RESULT" | sed -n 's/^SYNC_RESULT_JSON=//p' | tail -n 1)"
          if [ -z "$SYNC_JSON" ]; then
            echo "SYNC_RESULT_JSON missing from sync-upstream-manifest output" >&2
            exit 1
          fi

          DELIMITER="gha_delimiter_$(date +%s)_$$"
          {
            printf 'changed=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.changed')"
            printf 'local_signature=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.local_signature')"
            printf 'remote_signature=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.remote_signature')"
            printf 'snapshot_commit_sha=%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.snapshot_commit_sha')"
            printf 'change_summary<<%s\n' "$DELIMITER"
            printf '%s\n' "$(printf '%s' "$SYNC_JSON" | jq -r '.change_summary')"
            printf '%s\n' "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing sync PR
        id: idempotency
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_SHA: ${{ steps.compare.outputs.snapshot_commit_sha }}
        run: |
          SHA12="${SNAPSHOT_SHA:0:12}"
          BRANCH="chore/catalog-sync-${SHA12}"
          EXISTING=$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING fuer Branch $BRANCH bereits vorhanden, verwende die bestehende PR."
            echo "create_pr=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "Remote branch $BRANCH bereits vorhanden, verwende ihn erneut."
              echo "branch_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "branch_exists=false" >> "$GITHUB_OUTPUT"
            fi
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and PR
        id: create
        if: steps.compare.outputs.changed == 'true' && steps.idempotency.outputs.create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.idempotency.outputs.branch }}
          BRANCH_EXISTS: ${{ steps.idempotency.outputs.branch_exists }}
          SNAPSHOT_SHA: ${{ steps.compare.outputs.snapshot_commit_sha }}
          CHANGE_SUMMARY: ${{ steps.compare.outputs.change_summary }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$BRANCH_EXISTS" != "true" ]; then
            git checkout -b "$BRANCH"
            git add upstream-manifest.json
            git commit -m "chore(ci): update BSI upstream manifest (${SNAPSHOT_SHA:0:12})"
            git push origin "$BRANCH"
          else
            # Ensure refs/remotes/origin/$BRANCH exists so --force-with-lease has a lease value.
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH"
            git add upstream-manifest.json
            git commit -m "chore(ci): update BSI upstream manifest (${SNAPSHOT_SHA:0:12})"
            git push --force-with-lease origin "$BRANCH"
          fi

          {
            echo "## BSI-Katalog-Aenderungen"
            echo ""
            printf '%s\n' "$CHANGE_SUMMARY"
            echo ""
            printf '**BSI-Snapshot:** [`%s`](https://github.com/BSI-Bund/Stand-der-Technik-Bibliothek/commit/%s)\n' \
              "${SNAPSHOT_SHA}" "${SNAPSHOT_SHA}"
            echo ""
            echo '*Erstellt automatisch durch den taeglichen Katalog-Sync.*'
          } > /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --title "chore(ci): BSI-Katalog-Sync ${SNAPSHOT_SHA:0:12}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH")

          echo "PR erstellt: $PR_URL"
          PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Merge sync PR
        id: merge
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER_CREATE: ${{ steps.create.outputs.pr_number }}
          PR_NUMBER_EXISTING: ${{ steps.idempotency.outputs.pr_number }}
        run: |
          set -euo pipefail

          PR_NUMBER="${PR_NUMBER_CREATE:-$PR_NUMBER_EXISTING}"
          if [ -z "$PR_NUMBER" ]; then
            echo "Kein Sync-PR gefunden, kann nicht mergen." >&2
            exit 1
          fi

          MERGE_OUTPUT_FILE=/tmp/gh-pr-merge-output.txt
          if gh pr merge --squash --delete-branch "$PR_NUMBER" >"$MERGE_OUTPUT_FILE" 2>&1; then
            cat "$MERGE_OUTPUT_FILE"
          else
            cat "$MERGE_OUTPUT_FILE" >&2
            exit 1
          fi

          PR_VIEW_JSON="$(gh pr view "$PR_NUMBER" --json state,mergeCommit)"
          PR_STATE="$(printf '%s' "$PR_VIEW_JSON" | jq -r '.state')"
          MERGE_COMMIT_SHA="$(printf '%s' "$PR_VIEW_JSON" | jq -r '.mergeCommit.oid // empty')"

          if [ "$PR_STATE" != "MERGED" ]; then
            echo "PR-State nach Merge ist '$PR_STATE', erwartet 'MERGED'." >&2
            exit 1
          fi
          if [ -z "$MERGE_COMMIT_SHA" ]; then
            echo "Konnte Merge-Commit-SHA fuer PR #$PR_NUMBER nicht ermitteln." >&2
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_state=$PR_STATE" >> "$GITHUB_OUTPUT"
          echo "merge_commit_sha=$MERGE_COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify manifest on main and trigger deploy
        if: steps.compare.outputs.changed == 'true' && steps.merge.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COMMIT_SHA: ${{ steps.merge.outputs.merge_commit_sha }}
          SNAPSHOT_SHA: ${{ steps.compare.outputs.snapshot_commit_sha }}
        run: |
          set -euo pipefail

          if [ -z "$MERGE_COMMIT_SHA" ]; then
            echo "Kein Merge-Commit-SHA vorhanden, breche Deploy-Dispatch ab." >&2
            exit 1
          fi
          if [ -z "$SNAPSHOT_SHA" ]; then
            echo "Kein Snapshot-Commit-SHA vorhanden, breche Deploy-Dispatch ab." >&2
            exit 1
          fi

          # Ancestor-Check via GitHub Compare API, robust gegen shallow Checkouts.
          # status="identical": Merge-Commit ist HEAD von main.
          # status="behind"   : Merge-Commit ist Ancestor von main (weitere Pushes danach).
          COMPARE_STATUS="$(gh api "repos/$GITHUB_REPOSITORY/compare/main...$MERGE_COMMIT_SHA" --jq '.status')"
          case "$COMPARE_STATUS" in
            identical|behind)
              echo "Merge-Commit $MERGE_COMMIT_SHA ist auf main sichtbar (compare status=$COMPARE_STATUS)."
              ;;
            *)
              echo "Merge-Commit $MERGE_COMMIT_SHA ist nicht auf main sichtbar (compare status=$COMPARE_STATUS)." >&2
              exit 1
              ;;
          esac

          MANIFEST_SHA_ON_MAIN="$(gh api "repos/$GITHUB_REPOSITORY/contents/upstream-manifest.json?ref=main" \
            -H 'Accept: application/vnd.github.raw' \
            | jq -r '.snapshotCommitSha')"
          if [ "$MANIFEST_SHA_ON_MAIN" != "$SNAPSHOT_SHA" ]; then
            echo "snapshotCommitSha auf main ($MANIFEST_SHA_ON_MAIN) entspricht nicht dem erwarteten Snapshot ($SNAPSHOT_SHA)." >&2
            exit 1
          fi

          echo "Manifest-Snapshot $SNAPSHOT_SHA ist auf main verifiziert, loese Deploy aus."
          gh workflow run deploy.yml --ref main
          echo "Deploy via workflow_dispatch fuer ref=main ausgeloest."

          # Best-effort: den getriggerten Deploy-Run zur Nachvollziehbarkeit verlinken.
          sleep 5
          if RUN_INFO="$(gh run list --workflow=deploy.yml --branch=main --event=workflow_dispatch \
                --limit=1 --json databaseId,url,createdAt 2>/dev/null)"; then
            printf '%s\n' "$RUN_INFO" \
              | jq -r '.[0] | "Deploy-Run: \(.url) (created \(.createdAt))"' \
              || echo "Deploy-Run konnte nicht formatiert werden (nicht kritisch)."
          else
            echo "Konnte den ausgeloesten Deploy-Run nicht abfragen (nicht kritisch)."
          fi
