name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read pinned snapshot SHA from manifest
        id: manifest
        run: |
          sha=$(jq -r '.snapshotCommitSha' upstream-manifest.json)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Fetch BSI catalog and official vocabularies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BSI_SNAPSHOT_SHA: ${{ steps.manifest.outputs.sha }}
        run: npm run fetch-catalog

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Build application
        env:
          VITE_IMPRESSUM_NAME: ${{ secrets.VITE_IMPRESSUM_NAME }}
          VITE_IMPRESSUM_STRASSE: ${{ secrets.VITE_IMPRESSUM_STRASSE }}
          VITE_IMPRESSUM_PLZ_ORT: ${{ secrets.VITE_IMPRESSUM_PLZ_ORT }}
          VITE_IMPRESSUM_EMAIL: ${{ secrets.VITE_IMPRESSUM_EMAIL }}
          VITE_IMPRESSUM_TELEFON: ${{ secrets.VITE_IMPRESSUM_TELEFON }}
        run: npm run build

      - name: Generate SLSA Provenance
        uses: actions/attest@v4
        with:
          subject-path: 'dist/**'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
